services:
  # Сервис базы данных PostgreSQL
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    # Том для сохранения данных БД между перезапусками
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Проверка готовности БД перед запуском зависимых сервисов
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Сервис backend-приложения (FastAPI)
  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Переопределяем DATABASE_URL для Docker-сети (хост db вместо localhost)
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    # Монтируем исходный код для горячей перезагрузки
    volumes:
      - .:/app
    # Запуск только после готовности БД
    depends_on:
      db:
        condition: service_healthy

  # Сервис frontend-приложения (Create React App dev-server)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # REACT_APP_* читаются из окружения при старте CRA dev-server.
      # Браузер ходит с хоста, поэтому используем localhost, а не docker-hostname.
      REACT_APP_API_BASE_URL: http://localhost:8000
      REACT_APP_WS_BASE_URL: ws://localhost:8000
      REACT_APP_USE_MOCKS: "false"
      # Polling watcher — hot reload изнутри контейнера с bind-mount.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    # Bind-mount для горячей перезагрузки; анонимный volume на node_modules,
    # чтобы установленные в образе зависимости не затирались хостовыми.
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    stdin_open: true
    tty: true

# Именованный том для хранения данных PostgreSQL
volumes:
  postgres_data:
