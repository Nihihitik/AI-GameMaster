name: gamemaster-backend

services:
  db:
    image: postgres:16-alpine
    container_name: gamemaster-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Хост-порт 5433, чтобы не конфликтовать с локальным postgres на 5432
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      # BuildKit нужен для cache-mount'ов в Dockerfile
      dockerfile: Dockerfile
    container_name: gamemaster-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Хост db вместо localhost — внутренняя docker-сеть
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # CORS: докер-фронт (3001), локальный CRA (3000), Vite (5173)
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      APP_ENV: development
      LOG_LEVEL: DEBUG
      PYTHONUNBUFFERED: "1"
      FRONTEND_LOG_INGEST_ENABLED: "true"
    ports:
      - "8000:8000"
    # Bind-mount для горячей перезагрузки uvicorn --reload
    volumes:
      - .:/app
    # Применяем миграции перед стартом — иначе recovery_loop падает на отсутствующих таблицах
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
