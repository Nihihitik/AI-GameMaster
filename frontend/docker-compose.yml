name: gamemaster-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamemaster-frontend
    restart: unless-stopped
    environment:
      # Браузер открывается с хоста — API/WS адресуются через опубликованный порт бэка.
      # Бэкенд поднимается отдельным compose из ../backend и слушает 8001 на хосте.
      REACT_APP_API_BASE_URL: http://localhost:8000
      REACT_APP_WS_BASE_URL: ws://localhost:8000
      REACT_APP_USE_MOCKS: "false"
      REACT_APP_APP_ENV: development
      REACT_APP_LOG_LEVEL: debug
      REACT_APP_REMOTE_LOGS_ENABLED: "true"
      REACT_APP_REMOTE_LOG_MIN_LEVEL: debug
      REACT_APP_LOG_CAPTURE_CONSOLE: "true"
      # Polling watcher — hot reload изнутри контейнера с bind-mount.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    # Bind-mount для hot reload; анонимный volume на node_modules,
    # чтобы установленные в образе зависимости не затирались хостовыми.
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
